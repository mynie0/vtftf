<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarSix Community | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #050508;
            --surface: #0d0d14;
            --border: rgba(139,92,246,0.15);
            --purple: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --pink: #ff2d75;
            --text: #e4e4f0;
            --muted: #52526b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5,5,8,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #fff;
        }
        .logo-text span { color: var(--purple); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(5,5,8,0.97);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 8px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 50;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }
        .nav-item i { font-size: 17px; }
        .nav-item span { font-size: 8px; }
        .nav-item.active {
            background: rgba(139,92,246,0.08);
            color: var(--purple);
            border: 1px solid var(--border);
        }

        .card {
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 8px 14px;
            cursor: pointer;
        }
        .btn-ghost {
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 6px 12px;
            cursor: pointer;
        }
        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .inp {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            outline: none;
        }
        textarea.inp { resize: vertical; }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            z-index: 200;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity:0; transform: translateX(-50%) translateY(10px); }
            to { opacity:1; transform: translateX(-50%) translateY(0); }
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-box {
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }
        .modal-box::before {
            content: '';
            display: block;
            width: 36px;
            height: 3px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 auto 18px;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .view { animation: fadeIn 0.2s ease; }
        .hidden { display: none !important; }
        .mono { font-family: 'Space Mono', monospace; }
        .script-item, .key-item {
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .script-url {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            font-size: 9px;
            word-break: break-all;
        }
        .badge {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-family: 'Space Mono', monospace;
        }
        .badge-trial { background: rgba(0,255,255,0.1); color: #00ffff; }
        .badge-vip { background: rgba(255,45,117,0.1); color: #ff2d75; }
        .badge-lifetime { background: rgba(139,92,246,0.1); color: #8b5cf6; }
        .badge-active { background: rgba(16,185,129,0.1); color: #10b981; }
        .badge-expired { background: rgba(239,68,68,0.1); color: #ef4444; }
        .dot-live {
            width: 7px; height: 7px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .section-label {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#8b5cf6);display:flex;align-items:center;justify-content:center;">
            <i class="fas fa-star" style="color:#fff;"></i>
        </div>
        <div>
            <div class="logo-text">STARSIX<span>.DASH</span></div>
            <div style="font-size:9px;color:var(--muted);">Admin Panel</div>
        </div>
    </div>
    <div style="display:flex;gap:8px;">
        <span class="dot-live"></span>
        <button onclick="refreshAll()" class="btn-ghost"><i class="fas fa-rotate-right"></i></button>
    </div>
</header>

<main class="px-4 pt-4">

    <div id="dashboardView" class="view">
        <div class="section-label">Overview</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
            <div class="card p-3"><div class="mono" style="font-size:9px;color:var(--muted);">TOTAL KEYS</div><div style="font-size:26px;font-weight:800;" id="statTotalKeys">—</div></div>
            <div class="card p-3"><div class="mono" style="font-size:9px;color:var(--muted);">AKTIF</div><div style="font-size:26px;font-weight:800;" id="statActiveKeys">—</div></div>
            <div class="card p-3"><div class="mono" style="font-size:9px;color:var(--muted);">TRIAL</div><div style="font-size:26px;font-weight:800;" id="statTrialKeys">—</div></div>
            <div class="card p-3"><div class="mono" style="font-size:9px;color:var(--muted);">VIP/LIFE</div><div style="font-size:20px;font-weight:800;" id="statVipKeys">—</div></div>
        </div>
        <div class="card p-3"><div class="section-label">Log Aktiviti</div><div id="activityLog" style="max-height:200px;overflow-y:auto;"></div></div>
    </div>

    <div id="keysView" class="view hidden">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
            <div><div style="font-size:16px;font-weight:700;">Manage Keys</div><div class="mono" style="font-size:10px;color:var(--muted);" id="keysCount">— keys</div></div>
            <button onclick="openAddKeyModal()" class="btn-primary"><i class="fas fa-plus"></i> Generate Key</button>
        </div>
        <div id="keysList"></div>
    </div>

    <div id="scriptsView" class="view hidden">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
            <div><div style="font-size:16px;font-weight:700;">Script Manager</div><div class="mono" style="font-size:10px;color:var(--muted);" id="scriptsCount">— scripts</div></div>
            <button onclick="openAddScriptModal()" class="btn-primary"><i class="fas fa-plus"></i> New Script</button>
        </div>
        <div id="scriptsList"></div>
    </div>

    <div id="settingsView" class="view hidden">
        <div style="font-size:16px;font-weight:700;margin-bottom:14px;">Tetapan</div>
        <div class="card p-4">
            <div class="section-label">// API CONFIGURATION</div>
            <div style="margin-bottom:10px;">
                <label class="mono" style="font-size:9px;color:var(--muted);">API URL</label>
                <input type="text" id="settingApiUrl" class="inp" placeholder="https://your-domain.vercel.app">
            </div>
            <button onclick="saveApiUrl()" class="btn-primary" style="width:100%;">Simpan</button>
        </div>
    </div>

</main>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showView('dashboard')"><i class="fas fa-chart-line"></i><span>HOME</span></div>
    <div class="nav-item" onclick="showView('keys')"><i class="fas fa-key"></i><span>KEYS</span></div>
    <div class="nav-item" onclick="showView('scripts')"><i class="fas fa-code"></i><span>SCRIPT</span></div>
    <div class="nav-item" onclick="showView('settings')"><i class="fas fa-cog"></i><span>SET</span></div>
</nav>

<!-- MODALS -->
<div id="modalAddKey" class="modal-bg hidden"><div class="modal-box"><div style="font-size:14px;font-weight:700;margin-bottom:14px;">GENERATE KEY</div>
<select id="addKeyRole" class="inp mb-2" onchange="toggleKeyFields()"><option value="TRIAL">Trial</option><option value="VIP">VIP</option><option value="LIFETIME">Lifetime</option></select>
<div id="usernameField"><input type="text" id="addKeyUsername" class="inp mb-2" placeholder="Username Roblox"></div>
<div id="expireField"><input type="date" id="addKeyExpire" class="inp mb-2"></div>
<div style="display:flex;gap:8px;"><button onclick="closeModal('modalAddKey')" class="btn-ghost" style="flex:1;">Batal</button><button onclick="submitAddKey()" class="btn-primary" style="flex:1;">Generate</button></div></div></div>

<div id="modalAddScript" class="modal-bg hidden"><div class="modal-box"><div style="font-size:14px;font-weight:700;margin-bottom:14px;">NEW SCRIPT</div>
<input type="text" id="addScriptId" class="inp mb-2" placeholder="Script ID (contoh: autofarm)">
<textarea id="addScriptContent" class="inp mb-2" rows="8" placeholder="print('Hello StarSix!')"></textarea>
<div style="display:flex;gap:8px;"><button onclick="closeModal('modalAddScript')" class="btn-ghost" style="flex:1;">Batal</button><button onclick="submitAddScript()" class="btn-primary" style="flex:1;">Simpan</button></div></div></div>

<div id="modalDeleteConfirm" class="modal-bg hidden"><div class="modal-box"><div style="text-align:center;margin-bottom:20px;"><i class="fas fa-trash-alt" style="font-size:40px;color:var(--red);"></i><p id="deleteMessage" class="mt-2">Hapus item ini?</p></div>
<div style="display:flex;gap:8px;"><button onclick="closeModal('modalDeleteConfirm')" class="btn-ghost" style="flex:1;">Batal</button><button id="deleteConfirmBtn" class="btn-danger" style="flex:1;">Hapus</button></div></div></div>

<script>
let API_URL = localStorage.getItem('starsix_api_url') || window.location.origin;
let keysData = {};
let scriptsData = [];
let activityData = [];
let pendingDelete = null;

function generateKeyCode(role) {
    const prefix = role === 'TRIAL' ? 'TRL' : (role === 'VIP' ? 'VIP' : 'LIFE');
    return `STARSIX-${prefix}-${Math.random().toString(36).substring(2, 10).toUpperCase()}`;
}

function isExpired(expire) { if (!expire || expire === '-') return false; return new Date(expire) < new Date(); }
function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function toast(msg, type='ok') {
    document.querySelectorAll('.toast').forEach(t=>t.remove());
    const el = document.createElement('div'); el.className = 'toast';
    el.innerHTML = `<i class="fas ${type==='ok'?'fa-circle-check':type==='err'?'fa-circle-xmark':'fa-circle-info'}" style="color:${type==='ok'?'#10b981':type==='err'?'#ef4444':'#8b5cf6'};"></i><span>${msg}</span>`;
    document.body.appendChild(el); setTimeout(()=>el?.remove(),2800);
}
function copyToClipboard(t) { navigator.clipboard.writeText(t); toast('Disalin!','ok'); }
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

async function apiFetch(path, opt={}) {
    const res = await fetch(`${API_URL}${path}`, {...opt, headers:{'Content-Type':'application/json'}});
    return res.json();
}

async function loadScripts() {
    try { const d = await apiFetch('/api/scripts'); if(d.success) scriptsData = d.scripts; renderScripts(); } catch(e){}
}
async function createScript(id, content) { return await apiFetch('/api/script', {method:'POST', body:JSON.stringify({id,content})}); }
async function deleteScript(id) { return await apiFetch(`/api/script/${id}`, {method:'DELETE'}); }

function loadLocal() {
    keysData = JSON.parse(localStorage.getItem('starsix_keys') || '{}');
    activityData = JSON.parse(localStorage.getItem('starsix_activity') || '[{"action":"System Ready","details":"StarSix Online","time":new Date().toISOString()}]');
    if(Object.keys(keysData).length===0){ let d=new Date(); d.setFullYear(d.getFullYear()+1); keysData={"STARSIX-TRIAL-001":{username:"",role:"TRIAL",expire:d.toISOString().split('T')[0]}}; }
    renderAll();
}
function saveLocal() { localStorage.setItem('starsix_keys',JSON.stringify(keysData)); localStorage.setItem('starsix_activity',JSON.stringify(activityData)); }
function addActivity(a,d) { activityData.unshift({action:a,details:d,time:new Date().toISOString()}); if(activityData.length>50) activityData.pop(); saveLocal(); renderActivity(); }

function renderStats() {
    const total=Object.keys(keysData).length, active=Object.values(keysData).filter(d=>!isExpired(d.expire)).length;
    const trial=Object.values(keysData).filter(d=>d.role==='TRIAL').length, vip=Object.values(keysData).filter(d=>d.role==='VIP'||d.role==='LIFETIME').length;
    document.getElementById('statTotalKeys').textContent=total; document.getElementById('statActiveKeys').textContent=active;
    document.getElementById('statTrialKeys').textContent=trial; document.getElementById('statVipKeys').textContent=vip;
}
function renderActivity() {
    const el=document.getElementById('activityLog');
    if(!activityData.length){ el.innerHTML='<div class="mono" style="padding:20px;text-align:center;color:var(--muted);">Tiada aktiviti</div>'; return; }
    el.innerHTML=activityData.slice(0,15).map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);"><div style="width:5px;height:5px;background:var(--purple);border-radius:50%;"></div><div style="flex:1;"><span style="font-size:10px;">${a.action}</span><div style="font-size:8px;color:var(--muted);">${a.details}</div></div><span style="font-size:8px;color:var(--muted);">${new Date(a.time).toLocaleTimeString()}</span></div>`).join('');
}
function renderKeys() {
    const el=document.getElementById('keysList'); document.getElementById('keysCount').textContent=Object.keys(keysData).length+' keys';
    if(!Object.keys(keysData).length){ el.innerHTML='<div class="mono" style="padding:40px;text-align:center;color:var(--muted);">Tiada keys</div>'; return; }
    el.innerHTML=Object.entries(keysData).map(([code,data])=>{ const status=!isExpired(data.expire)?'active':'expired'; const badge=data.role==='TRIAL'?'badge-trial':(data.role==='VIP'?'badge-vip':'badge-lifetime');
    return `<div class="key-item"><div style="display:flex;justify-content:space-between;"><div><div class="mono" style="font-weight:700;">${code}</div><div style="margin-top:4px;"><span class="badge ${badge}">${data.role}</span> <span class="badge ${status==='active'?'badge-active':'badge-expired'}">${status==='active'?'Aktif':'Expired'}</span></div></div><div><button onclick='openEditKeyModal("${code}")' class="btn-ghost" style="padding:5px 8px;"><i class="fas fa-pen"></i></button> <button onclick='confirmDelete("key","${code}")' class="btn-danger" style="padding:5px 8px;"><i class="fas fa-trash"></i></button></div></div><div style="display:flex;gap:12px;margin-top:8px;"><div><div class="mono" style="font-size:8px;color:var(--muted);">EXPIRED</div><div class="mono" style="font-size:9px;">${data.expire==='-'?'Lifetime':data.expire}</div></div><div><div class="mono" style="font-size:8px;color:var(--muted);">PENGGUNA</div><div class="mono" style="font-size:9px;color:var(--purple);">${data.username||'Sesiapa'}</div></div></div></div>`;}).join('');
}
function renderScripts() {
    const el=document.getElementById('scriptsList'); document.getElementById('scriptsCount').textContent=scriptsData.length+' scripts';
    if(!scriptsData.length){ el.innerHTML='<div class="mono" style="padding:40px;text-align:center;color:var(--muted);">Tiada script</div>'; return; }
    el.innerHTML=scriptsData.map(s=>{ const url=`${API_URL}/raw/${s.id}`; const ls=`loadstring(game:HttpGet('${url}'))()`;
    return `<div class="script-item"><div style="display:flex;justify-content:space-between;"><div><div style="font-weight:700;">${escapeHtml(s.name||s.id)}</div><div class="mono" style="font-size:8px;color:var(--muted);">ID: ${s.id}</div></div><div><button onclick="copyToClipboard('${ls.replace(/'/g,"\\'")}')" class="btn-primary" style="padding:5px 8px;"><i class="fas fa-copy"></i></button> <button onclick="confirmDelete('script','${s.id}')" class="btn-danger" style="padding:5px 8px;"><i class="fas fa-trash"></i></button></div></div><div class="script-url mono" style="margin-top:8px;">${url}</div></div>`;}).join('');
}
function renderAll() { renderStats(); renderActivity(); renderKeys(); }

async function submitAddKey(){
    const role=document.getElementById('addKeyRole').value, username=document.getElementById('addKeyUsername').value.trim();
    let expire=document.getElementById('addKeyExpire').value;
    if(role!=='TRIAL' && !username){ toast('Masukkan username!','err'); return; }
    if(role!=='LIFETIME' && !expire){ let d=new Date(); d.setDate(d.getDate()+30); expire=d.toISOString().split('T')[0]; }
    const code=generateKeyCode(role);
    keysData[code]={username:role==='TRIAL'?'':username,role,expire:role==='LIFETIME'?'-':expire,created:new Date().toISOString().split('T')[0]};
    saveLocal(); addActivity('Key Generated',`${code} (${role})`); renderAll(); closeModal('modalAddKey'); toast(`Key: ${code}`,'ok');
}
function openAddKeyModal(){ document.getElementById('addKeyRole').value='TRIAL'; document.getElementById('addKeyUsername').value=''; document.getElementById('addKeyExpire').value=''; toggleKeyFields(); openModal('modalAddKey'); }
function toggleKeyFields(){ const role=document.getElementById('addKeyRole').value; document.getElementById('usernameField').style.display=role==='TRIAL'?'none':''; document.getElementById('expireField').style.display=role==='LIFETIME'?'none':''; }

async function submitAddScript(){
    const id=document.getElementById('addScriptId').value.trim().toLowerCase(), content=document.getElementById('addScriptContent').value.trim();
    if(!id){ toast('Script ID wajib!','err'); return; } if(!content){ toast('Script code wajib!','err'); return; }
    const res=await createScript(id,content);
    if(res.success){ addActivity('Script Created',id); await loadScripts(); closeModal('modalAddScript'); toast(`Script "${id}" ditambah!`,'ok'); }
    else toast(res.error||'Gagal','err');
}
function openAddScriptModal(){ document.getElementById('addScriptId').value=''; document.getElementById('addScriptContent').value=''; openModal('modalAddScript'); }

function confirmDelete(type,id){
    document.getElementById('deleteMessage').innerHTML=`Hapus ${type==='key'?'key':'script'}: <strong>${id}</strong>?`;
    pendingDelete=async()=>{
        if(type==='key'){ delete keysData[id]; saveLocal(); addActivity('Key Deleted',id); renderAll(); toast('Key dipadam!','ok'); }
        else{ const res=await deleteScript(id); if(res.success){ addActivity('Script Deleted',id); await loadScripts(); toast('Script dipadam!','ok'); } else toast('Gagal','err'); }
        closeModal('modalDeleteConfirm');
    };
    const btn=document.getElementById('deleteConfirmBtn'); const newBtn=btn.cloneNode(true); btn.parentNode.replaceChild(newBtn,btn);
    newBtn.id='deleteConfirmBtn'; newBtn.onclick=()=>{ if(pendingDelete) pendingDelete(); };
    openModal('modalDeleteConfirm');
}
function saveApiUrl(){ const url=document.getElementById('settingApiUrl').value.trim(); if(url){ API_URL=url; localStorage.setItem('starsix_api_url',url); toast('API URL disimpan!','ok'); loadScripts(); } }
async function refreshAll(){ toast('Refresh...','info'); loadLocal(); await loadScripts(); toast('Data dikemaskini!','ok'); }

function showView(name){
    ['dashboardView','keysView','scriptsView','settingsView'].forEach(v=>document.getElementById(v).classList.add('hidden'));
    document.getElementById(name+'View').classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach((n,i)=>{ if(i===['dashboard','keys','scripts','settings'].indexOf(name)) n.classList.add('active'); else n.classList.remove('active'); });
    if(name==='settings') document.getElementById('settingApiUrl').value=API_URL;
}
loadLocal(); loadScripts(); showView('dashboard'); setInterval(loadScripts,30000);
function openEditKeyModal(code){ const data=keysData[code]; if(!data)return; document.getElementById('editKeyCode').value=code; document.getElementById('editKeyRole').value=data.role; document.getElementById('editKeyUsername').value=data.username||''; document.getElementById('editKeyExpire').value=data.expire!=='-'?data.expire:''; toggleEditKeyFields(); openModal('modalEditKey'); }
function toggleEditKeyFields(){ const role=document.getElementById('editKeyRole').value; document.getElementById('editUsernameField').style.display=role==='TRIAL'?'none':''; document.getElementById('editExpireField').style.display=role==='LIFETIME'?'none':''; }
async function submitEditKey(){ const code=document.getElementById('editKeyCode').value, role=document.getElementById('editKeyRole').value, username=document.getElementById('editKeyUsername').value.trim(); let expire=document.getElementById('editKeyExpire').value; if(role!=='TRIAL' && !username){ toast('Masukkan username!','err'); return; } if(role!=='LIFETIME' && !expire && keysData[code]?.expire!=='-'){ let d=new Date(); d.setDate(d.getDate()+30); expire=d.toISOString().split('T')[0]; } keysData[code]={...keysData[code],username:role==='TRIAL'?'':username,role,expire:role==='LIFETIME'?'-':expire}; saveLocal(); addActivity('Key Updated',`${code}`); renderAll(); closeModal('modalEditKey'); toast('Key dikemaskini!','ok'); }
</script>

<div id="modalEditKey" class="modal-bg hidden"><div class="modal-box"><div style="font-size:14px;font-weight:700;margin-bottom:14px;">EDIT KEY</div><input type="hidden" id="editKeyCode"><select id="editKeyRole" class="inp mb-2" onchange="toggleEditKeyFields()"><option value="TRIAL">Trial</option><option value="VIP">VIP</option><option value="LIFETIME">Lifetime</option></select><div id="editUsernameField"><input type="text" id="editKeyUsername" class="inp mb-2" placeholder="Username"></div><div id="editExpireField"><input type="date" id="editKeyExpire" class="inp mb-2"></div><div style="display:flex;gap:8px;"><button onclick="closeModal('modalEditKey')" class="btn-ghost" style="flex:1;">Batal</button><button onclick="submitEditKey()" class="btn-primary" style="flex:1;">Kemaskini</button></div></div></div>

</body>
</html>
