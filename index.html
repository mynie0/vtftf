<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarSix Community | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050508;
            --surface: #0d0d14;
            --border: rgba(139,92,246,0.15);
            --purple: #8b5cf6;
            --purple-dim: rgba(139,92,246,0.08);
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --blue: #3b82f6;
            --text: #e4e4f0;
            --muted: #52526b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,92,246,0.015) 2px, rgba(139,92,246,0.015) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5,5,8,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #fff;
        }
        .logo-text span { color: var(--purple); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(5,5,8,0.97);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 8px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 50;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.2s;
            font-family: 'Space Mono', monospace;
        }
        .nav-item i { font-size: 17px; }
        .nav-item span { font-size: 8px; letter-spacing: 0.05em; }
        .nav-item.active {
            background: var(--purple-dim);
            color: var(--purple);
            border: 1px solid var(--border);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,92,246,0.4), transparent);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: -20px; right: -20px;
            width: 70px; height: 70px;
            border-radius: 50%;
            opacity: 0.06;
        }
        .stat-card.purple::after { background: var(--purple); }
        .stat-card.green::after { background: var(--green); }
        .stat-card.blue::after { background: var(--blue); }
        .stat-card.amber::after { background: var(--amber); }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }
        .badge-active { background: rgba(16,185,129,0.1); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
        .badge-expired { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
        .badge-trial { background: rgba(0,255,255,0.1); color: #00ffff; border: 1px solid rgba(0,255,255,0.2); }
        .badge-vip { background: rgba(255,45,117,0.1); color: #ff2d75; border: 1px solid rgba(255,45,117,0.2); }
        .badge-lifetime { background: rgba(139,92,246,0.1); color: var(--purple); border: 1px solid var(--border); }

        .mono { font-family: 'Space Mono', monospace; }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }

        .btn-ghost {
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-copy {
            background: rgba(139,92,246,0.15);
            color: var(--purple);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 10px;
            transition: all 0.2s;
        }
        .btn-copy:hover { background: rgba(139,92,246,0.3); }

        .inp {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            outline: none;
        }
        .inp:focus { border-color: rgba(139,92,246,0.5); }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 200;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            animation: toastIn 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        @keyframes toastIn {
            from { opacity:0; transform: translateX(-50%) translateY(10px); }
            to { opacity:1; transform: translateX(-50%) translateY(0); }
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            padding: 20px 16px 32px;
            animation: slideUp 0.3s cubic-bezier(.16,1,.3,1);
        }
        .modal-box::before {
            content: '';
            display: block;
            width: 36px;
            height: 3px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 auto 18px;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .view { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn {
            from { opacity:0; transform: translateY(6px); }
            to { opacity:1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        .key-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .dot-live {
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px var(--green);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; }
            50% { opacity:0.4; }
        }

        .section-label {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        main { position: relative; z-index: 1; }

        .key-code-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .key-code {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            word-break: break-all;
            background: rgba(255,255,255,0.03);
            padding: 4px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#8b5cf6);display:flex;align-items:center;justify-content:center;">
            <i class="fas fa-star" style="color:#fff;font-size:16px;"></i>
        </div>
        <div>
            <div class="logo-text">STARSIX<span>.DASH</span></div>
            <div style="font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;">Admin Panel</div>
        </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
        <span class="dot-live"></span>
        <button onclick="refreshAll()" class="btn-ghost" style="padding:6px 12px;">
            <i class="fas fa-rotate-right"></i>
        </button>
    </div>
</header>

<main class="px-4 pt-4" id="mainContent">

    <div id="dashboardView" class="view">
        <div class="section-label">Overview</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
            <div class="stat-card purple">
                <div style="display:flex;justify-content:space-between;">
                    <div>
                        <div class="mono" style="font-size:9px;color:var(--muted);">TOTAL KEYS</div>
                        <div style="font-size:26px;font-weight:800;" id="statTotalKeys">0</div>
                    </div>
                    <div style="width:32px;height:32px;background:rgba(139,92,246,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-key" style="color:var(--purple);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card green">
                <div style="display:flex;justify-content:space-between;">
                    <div>
                        <div class="mono" style="font-size:9px;color:var(--muted);">AKTIF</div>
                        <div style="font-size:26px;font-weight:800;" id="statActiveKeys">0</div>
                    </div>
                    <div style="width:32px;height:32px;background:rgba(16,185,129,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-circle-check" style="color:var(--green);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card blue">
                <div style="display:flex;justify-content:space-between;">
                    <div>
                        <div class="mono" style="font-size:9px;color:var(--muted);">TRIAL</div>
                        <div style="font-size:26px;font-weight:800;" id="statTrialKeys">0</div>
                    </div>
                    <div style="width:32px;height:32px;background:rgba(59,130,246,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-flask" style="color:var(--blue);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card amber">
                <div style="display:flex;justify-content:space-between;">
                    <div>
                        <div class="mono" style="font-size:9px;color:var(--muted);">VIP/LIFE</div>
                        <div style="font-size:20px;font-weight:800;" id="statVipKeys">0</div>
                    </div>
                    <div style="width:32px;height:32px;background:rgba(245,158,11,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-crown" style="color:var(--amber);"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="card p-3 mb-4">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                <div class="section-label" style="margin:0;">Penjualan Bulanan</div>
                <span class="mono" style="font-size:9px;color:var(--purple);">2026</span>
            </div>
            <canvas id="salesChart" height="130"></canvas>
        </div>

        <div class="card p-3">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                <div class="section-label" style="margin:0;">Log Aktiviti</div>
                <span id="activityCount" class="mono" style="font-size:9px;color:var(--muted);"></span>
            </div>
            <div id="activityLog" style="max-height:220px;overflow-y:auto;"></div>
        </div>
    </div>

    <div id="keysView" class="view hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div>
                <div style="font-size:16px;font-weight:700;">Manage Keys</div>
                <div class="mono" style="font-size:10px;color:var(--muted);" id="keysCount">0 keys</div>
            </div>
            <button onclick="openAddKeyModal()" class="btn-primary" style="padding:8px 14px;">
                <i class="fas fa-plus"></i> Generate Key
            </button>
        </div>
        <div id="keysList" style="max-height:calc(100vh - 200px);overflow-y:auto;"></div>
    </div>

    <div id="settingsView" class="view hidden">
        <div style="font-size:16px;font-weight:700;margin-bottom:14px;">Tetapan</div>
        
        <div class="card p-4" style="margin-bottom:12px;">
            <div class="section-label" style="margin-bottom:12px;">// GITHUB GIST CONFIG</div>
            <div style="margin-bottom:10px;">
                <label class="mono" style="font-size:9px;color:var(--muted);display:block;margin-bottom:5px;">GIST ID</label>
                <input type="text" id="settingGistId" class="inp" placeholder="e42299173afabebb5b84d90aee00769bdb83fccf">
            </div>
            <div style="margin-bottom:10px;">
                <label class="mono" style="font-size:9px;color:var(--muted);display:block;margin-bottom:5px;">GITHUB TOKEN</label>
                <input type="password" id="settingGithubToken" class="inp" placeholder="github_pat_xxx">
            </div>
            <button onclick="saveGistSettings()" class="btn-primary" style="width:100%;padding:10px;">Simpan & Sync</button>
        </div>

        <div class="card p-4">
            <div class="section-label" style="margin-bottom:12px;">// BACKUP & RESTORE</div>
            <button onclick="exportData()" class="btn-ghost" style="width:100%;padding:10px;margin-bottom:8px;">
                <i class="fas fa-download"></i> Export Data (JSON)
            </button>
            <button onclick="document.getElementById('importFile').click()" class="btn-ghost" style="width:100%;padding:10px;">
                <i class="fas fa-upload"></i> Import Data
            </button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
        </div>
    </div>

</main>

<nav class="bottom-nav">
    <div class="nav-item active" id="nav-dashboard" onclick="showView('dashboard')">
        <i class="fas fa-chart-line"></i><span>HOME</span>
    </div>
    <div class="nav-item" id="nav-keys" onclick="showView('keys')">
        <i class="fas fa-key"></i><span>KEYS</span>
    </div>
    <div class="nav-item" id="nav-settings" onclick="showView('settings')">
        <i class="fas fa-cog"></i><span>SET</span>
    </div>
</nav>

<!-- MODALS -->
<div id="modalAddKey" class="modal-bg hidden">

        <div style="font-size:14px;font-weight:700;margin-bottom:14px;">+ GENERATE KEY</div>

<div id="modalEditKey" class="modal-bg hidden">
    <div class="modal-box">
        <div style="font-size:14px;font-weight:700;margin-bottom:14px;">EDIT KEY</div>
        <input type="hidden" id="editKeyCode">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <div>
                <label class="mono" style="font-size:9px;color:var(--muted);display:block;margin-bottom:5px;">JENIS KEY</label>
                <select id="editKeyRole" class="inp" onchange="toggleEditKeyFields()">
                    <option value="TRIAL">Trial</option>

                <label class="mono" style="font-size:9px;color:var(--muted);display:block;margin-bottom:5px;">USERNAME</label>
                <input type="text" id="editKeyUsername" class="inp">
            </div>
            <div id="editExpireField">
                <label class="mono" style="font-size:9px;color:var(--muted);display:block;margin-bottom:5px;">TARIKH EXPIRED</label>

            </div>
            <div style="display:flex;gap:8px;">
                <button onclick="closeModal('modalEditKey')" class="btn-ghost" style="flex:1;padding:10px;">Batal</button>
                <button onclick="submitEditKey()" class="btn-primary" style="flex:1;padding:10px;">Kemaskini</button>
            </div>
        </div>
    </div>
</div>

<div id="modalDeleteConfirm" class="modal-bg hidden">
    <div class="modal-box">
        <div style="font-size:16px;font-weight:700;margin-bottom:14px;text-align:center;">DELETE</div>
        <div style="text-align:center;margin-bottom:20px;">
            <i class="fas fa-trash-alt" style="font-size:40px;color:var(--red);margin-bottom:10px;"></i>
            <p id="deleteMessage">Anda pasti mahu hapus item ini?</p>
        </div>
        <div style="display:flex;gap:8px;">
            <button onclick="closeModal('modalDeleteConfirm')" class="btn-ghost" style="flex:1;padding:10px;">Batal</button>
            <button id="deleteConfirmBtn" class="btn-danger" style="flex:1;padding:10px;">Hapus</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// STAR SIX COMMUNITY DASHBOARD
// ============================================================

let keysData = {};
let activityData = [];
let lineChart;
let pendingDeleteCallback = null;

function initLineChart() {
    const ctx = document.getElementById('salesChart')?.getContext('2d');
    if (!ctx) return;
    lineChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mac', 'Apr', 'Mei', 'Jun'],
            datasets: [{
                label: 'Keys Generated',
                data: [0, 0, 0, 0, 0, 0],
                borderColor: '#8b5cf6',
                backgroundColor: 'rgba(139,92,246,0.08)',
                fill: true,
                tension: 0.4,
                pointRadius: 3,
                pointBackgroundColor: '#8b5cf6',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#52526b', font: { size: 9 } } },
                y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#52526b', font: { size: 9 } } }
            }
        }
    });
}

function updateLineChart() {
    if (!lineChart) return;
    const monthlyData = [0, 0, 0, 0, 0, 0];
    Object.values(keysData).forEach(key => {
        if (key.created) {
            const month = new Date(key.created).getMonth();
            if (month >= 0 && month < 6) monthlyData[month]++;
        }
    });
    lineChart.data.datasets[0].data = monthlyData;
    lineChart.update();
}

function loadData() {
    const savedKeys = localStorage.getItem('starsix_keys_data');
    const savedActivity = localStorage.getItem('starsix_activity_data');
    
    keysData = savedKeys ? JSON.parse(savedKeys) : {};
    activityData = savedActivity ? JSON.parse(savedActivity) : [];
    
    if (activityData.length === 0) {
        activityData = [{ action: 'System Ready', details: 'StarSix Community Online', time: new Date().toISOString() }];
    }
    
    renderAll();
}

function saveData() {
    localStorage.setItem('starsix_keys_data', JSON.stringify(keysData));
    localStorage.setItem('starsix_activity_data', JSON.stringify(activityData));
}

function addActivity(action, details) {
    activityData.unshift({ action, details, time: new Date().toISOString() });
    if (activityData.length > 50) activityData = activityData.slice(0, 50);
    saveData();
    renderActivityLog();
}

function generateKeyCode(role) {
    const prefix = role === 'TRIAL' ? 'TRL' : (role === 'VIP' ? 'VIP' : 'LIFE');
    const random = Math.random().toString(36).substring(2, 10).toUpperCase();
    return `STARSIX-${prefix}-${random}`;
}

function isExpired(expire) {
    if (!expire || expire === '-') return false;
    return new Date(expire) < new Date();
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    toast('Disalin ke clipboard!', 'ok');
}

function toast(msg, type = 'ok') {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const colors = { ok: '#10b981', err: '#ef4444', info: '#8b5cf6' };
    const icons = { ok: 'fa-circle-check', err: 'fa-circle-xmark', info: 'fa-circle-info' };
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<i class="fas ${icons[type]}" style="color:${colors[type]};"></i><span>${msg}</span>`;
    document.body.appendChild(el);
    setTimeout(() => el?.remove(), 2800);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function renderStats() {
    const total = Object.keys(keysData).length;
    const active = Object.entries(keysData).filter(([code, data]) => !isExpired(data.expire)).length;
    const trial = Object.values(keysData).filter(d => d.role === 'TRIAL').length;
    const vip = Object.values(keysData).filter(d => d.role === 'VIP' || d.role === 'LIFETIME').length;
    document.getElementById('statTotalKeys').textContent = total;
    document.getElementById('statActiveKeys').textContent = active;
    document.getElementById('statTrialKeys').textContent = trial;
    document.getElementById('statVipKeys').textContent = vip;
}

function renderActivityLog() {
    const el = document.getElementById('activityLog');
    document.getElementById('activityCount').textContent = activityData.length + ' entri';
    if (!activityData.length) {
        el.innerHTML = `<div style="text-align:center;color:var(--muted);padding:20px;">Tiada aktiviti</div>`;
        return;
    }
    el.innerHTML = activityData.slice(0, 15).map(a => `
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="width:5px;height:5px;background:var(--purple);border-radius:50%;"></div>
            <div style="flex:1;">
                <span style="font-size:10px;font-weight:600;">${escapeHtml(a.action)}</span>
                <span style="color:var(--muted);font-size:9px;font-family:'Space Mono',monospace;display:block;">${escapeHtml(a.details || '')}</span>
            </div>
            <span class="mono" style="font-size:8px;color:var(--muted);">${new Date(a.time).toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
    `).join('');
}

function renderKeys() {
    const el = document.getElementById('keysList');
    document.getElementById('keysCount').textContent = Object.keys(keysData).length + ' keys';
    if (Object.keys(keysData).length === 0) {
        el.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px;">Tiada keys. Klik "Generate Key" untuk mula.</div>`;
        return;
    }
    el.innerHTML = Object.entries(keysData).map(([code, data]) => {
        const status = !isExpired(data.expire);
        let badgeClass = data.role === 'TRIAL' ? 'badge-trial' : (data.role === 'VIP' ? 'badge-vip' : 'badge-lifetime');
        return `
        <div class="key-item">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
                <div class="key-code-wrapper">
                    <div class="key-code">${escapeHtml(code)}</div>
                    <button onclick="copyToClipboard('${escapeHtml(code)}')" class="btn-copy"><i class="fas fa-copy"></i> Copy</button>
                </div>
                <div style="display:flex;gap:6px;">
                    <button onclick="openEditKeyModal('${escapeHtml(code)}')" class="btn-ghost" style="padding:5px 8px;"><i class="fas fa-pen"></i></button>
                    <button onclick="confirmDelete('key', '${escapeHtml(code)}')" class="btn-danger" style="padding:5px 8px;"><i class="fas fa-trash"></i></button>
                </div>
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">
                <div><span class="badge ${badgeClass}">${data.role}</span> <span class="badge ${status ? 'badge-active' : 'badge-expired'}">${status ? 'Aktif' : 'Expired'}</span></div>
                <div><div class="mono" style="font-size:8px;color:var(--muted);">EXPIRED</div><div class="mono" style="font-size:9px;">${data.expire === '-' ? 'Lifetime' : data.expire}</div></div>
                <div><div class="mono" style="font-size:8px;color:var(--muted);">PENGGUNA</div><div class="mono" style="font-size:9px;color:var(--purple);">${escapeHtml(data.username) || 'Sesiapa'}</div></div>
                <div><div class="mono" style="font-size:8px;color:var(--muted);">DIBUAT</div><div class="mono" style="font-size:9px;">${data.created || '-'}</div></div>
            </div>
        </div>`;
    }).join('');
}

function renderAll() {
    renderStats();
    renderActivityLog();
    renderKeys();
    updateLineChart();
}

function toggleKeyFields() {
    const role = document.getElementById('addKeyRole').value;
    document.getElementById('usernameField').style.display = role === 'TRIAL' ? 'none' : '';
    document.getElementById('expireField').style.display = role === 'LIFETIME' ? 'none' : '';
}

function toggleEditKeyFields() {
    const role = document.getElementById('editKeyRole').value;
    document.getElementById('editUsernameField').style.display = role === 'TRIAL' ? 'none' : '';
    document.getElementById('editExpireField').style.display = role === 'LIFETIME' ? 'none' : '';
}

function openAddKeyModal() {
    document.getElementById('addKeyRole').value = 'TRIAL';
    document.getElementById('addKeyUsername').value = '';
    document.getElementById('addKeyExpire').value = '';
    toggleKeyFields();
    openModal('modalAddKey');
}

function submitAddKey() {
    const role = document.getElementById('addKeyRole').value;
    const username = document.getElementById('addKeyUsername').value.trim();
    let expire = document.getElementById('addKeyExpire').value;
    if (role !== 'TRIAL' && !username) { toast('Masukkan username!', 'err'); return; }
    if (role !== 'LIFETIME' && !expire) {
        const d = new Date(); d.setDate(d.getDate() + 30);
        expire = d.toISOString().split('T')[0];
    }
    const keyCode = generateKeyCode(role);
    keysData[keyCode] = { 
        username: role === 'TRIAL' ? '' : username, 
        role, 
        expire: role === 'LIFETIME' ? '-' : expire, 
        created: new Date().toISOString().split('T')[0] 
    };
    saveData();
    addActivity('Key Generated', `${keyCode} (${role})`);
    renderAll();
    closeModal('modalAddKey');
    toast(`Key: ${keyCode}`, 'ok');
}

function openEditKeyModal(code) {
    const data = keysData[code];
    if (!data) return;
    document.getElementById('editKeyCode').value = code;
    document.getElementById('editKeyRole').value = data.role;
    document.getElementById('editKeyUsername').value = data.username || '';
    document.getElementById('editKeyExpire').value = data.expire !== '-' ? data.expire : '';
    toggleEditKeyFields();
    openModal('modalEditKey');
}

function submitEditKey() {
    const code = document.getElementById('editKeyCode').value;
    const role = document.getElementById('editKeyRole').value;
    const username = document.getElementById('editKeyUsername').value.trim();
    let expire = document.getElementById('editKeyExpire').value;
    if (role !== 'TRIAL' && !username && keysData[code]?.username !== '') { toast('Masukkan username!', 'err'); return; }
    if (role !== 'LIFETIME' && !expire && keysData[code]?.expire !== '-') {
        const d = new Date(); d.setDate(d.getDate() + 30);
        expire = d.toISOString().split('T')[0];
    }
    keysData[code] = { ...keysData[code], username: role === 'TRIAL' ? '' : username, role, expire: role === 'LIFETIME' ? '-' : expire };
    saveData();
    addActivity('Key Updated', `${code} → ${role}`);
    renderAll();
    closeModal('modalEditKey');
    toast('Key dikemaskini!', 'ok');
}

function confirmDelete(type, id) {
    const msg = document.getElementById('deleteMessage');
    if (type === 'key') {
        msg.innerHTML = `Hapus key: <strong>${escapeHtml(id)}</strong>?`;
        pendingDeleteCallback = () => {
            delete keysData[id];
            saveData();
            addActivity('Key Deleted', id);
            renderAll();
            closeModal('modalDeleteConfirm');
            toast('Key dipadam!', 'ok');
        };
    }
    const confirmBtn = document.getElementById('deleteConfirmBtn');
    const newBtn = confirmBtn.cloneNode(true);
    confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
    newBtn.id = 'deleteConfirmBtn';
    newBtn.onclick = () => { if (pendingDeleteCallback) pendingDeleteCallback(); };
    openModal('modalDeleteConfirm');
}

function saveGistSettings() {
    const gistId = document.getElementById('settingGistId').value.trim();
    const token = document.getElementById('settingGithubToken').value.trim();
    if (gistId) localStorage.setItem('starsix_gist_id', gistId);
    if (token) localStorage.setItem('starsix_github_token', token);
    toast('Gist settings disimpan!', 'ok');
}

function exportData() {
    const data = { keys: keysData, activityLog: activityData };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `starsix_backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Data dieksport!', 'ok');
}

function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (data.keys) keysData = data.keys;
            if (data.activityLog) activityData = data.activityLog;
            saveData();
            renderAll();
            toast('Data diimport!', 'ok');
        } catch(err) { toast('File tidak valid!', 'err'); }
    };
    reader.readAsText(file);
    input.value = '';
}

function refreshAll() {
    loadData();
    toast('Data dikemaskini!', 'ok');
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', e => { if (e.target === bg) bg.classList.add('hidden'); });
});

const viewMap = { dashboard: 'dashboardView', keys: 'keysView', settings: 'settingsView' };

function showView(name) {
    Object.values(viewMap).forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById(viewMap[name]).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + name)?.classList.add('active');
}

initLineChart();
loadData();
showView('dashboard');
</script>
</body>
</html>
